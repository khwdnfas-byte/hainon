<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>HAINON - Offline Mode</title>
  <style type="text/css"> 
    :root { 
      --bg-gradient: radial-gradient(circle at center, #141416 0%, #080809 100%);
      --gold-primary: #D4AF37; 
      --gold-secondary: #AA8413;
      --gold-gradient: linear-gradient(135deg, #F3E7C4 0%, #D4AF37 50%, #8A6F27 100%);
      --text-main: #FFFFFF;
      --text-muted: #8E8E93;
      --border-color: rgba(212, 175, 55, 0.15);
    }
    
    [data-theme="light"] { 
      --bg-gradient: linear-gradient(180deg, #F8F9FA 0%, #E5E5EA 100%);
      --gold-primary: #8A6F27; 
      --gold-secondary: #544316;
      --gold-gradient: linear-gradient(135deg, #AA8413 0%, #8A6F27 100%);
      --text-main: #1C1C1E;
      --text-muted: #636366;
      --border-color: rgba(138, 111, 39, 0.2);
    }

    html, body { 
      background: var(--bg-gradient) !important; 
      transition: background 0.4s ease;
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    html, body, button { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
    } 

    .container { 
      color: var(--text-main); 
      text-align: center; 
      padding: 40px 30px;
      max-width: 480px;
      width: 100%;
      box-sizing: border-box;
      direction: rtl;
    } 

    .brand-glow {
      position: relative;
      display: inline-block;
      margin-bottom: 35px;
      animation: smoothPulse 3s infinite ease-in-out;
    }
    
    #logo svg {
      filter: drop-shadow(0px 4px 20px rgba(212, 175, 55, 0.15));
    }
    
    #logo > svg > g > path { 
      fill: var(--gold-primary); 
    }

    @keyframes smoothPulse {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.03); filter: brightness(1.2); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin: 0 0 16px 0;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.3;
    }

    p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin: 0 auto 32px auto;
      font-weight: 400;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    
    .status-panel {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      background: rgba(212, 175, 55, 0.06);
      color: var(--gold-primary);
      padding: 8px 18px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .radar-indicator {
      width: 6px;
      height: 6px;
      background-color: var(--gold-primary);
      border-radius: 50%;
      position: relative;
    }
    .radar-indicator::after {
      content: '';
      position: absolute;
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      border: 1px solid var(--gold-primary);
      border-radius: 50%;
      animation: radarScan 1.5s infinite linear;
    }
    @keyframes radarScan {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    button { 
      background: transparent;
      color: var(--gold-primary);
      border: 1px solid var(--gold-primary);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
      border-radius: 4px;
      padding: 14px 44px; 
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    button:hover {
      background: var(--gold-gradient);
      color: #000000;
      border-color: transparent;
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15);
      transform: translateY(-1px);
    }
    
    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-glow">
      <div id="logo">
        <svg width="90" height="72" viewBox="0 0 120 96" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#clip0_5510_497)"><path d="M118.275 87.9562L7.27647 0.958312C6.45147 0.313687 5.47272 0 4.50522 0C3.17022 0 1.84459 0.592125 0.959779 1.72294C-0.575284 3.68062 -0.234596 6.51 1.72253 8.04187L112.554 94.8731C114.523 96.4112 117.348 96.0596 118.871 94.1085C120.581 92.325 120.225 89.4937 118.275 87.9562Z" fill="black"/><path opacity="0.4" d="M36 53.8313C32.6869 53.8313 30 56.5163 30 59.6625V89.4937C30 92.8069 32.6869 95.4937 36 95.4937C39.3131 95.4937 42 92.8069 42 89.4937V59.6625C42 56.6813 39.3187 53.8313 36 53.8313ZM54 90C54 93.3131 56.6869 96 60 96C63.3131 96 66 93.3131 66 90V69.8625L54 60.4575V90ZM12 71.8313C8.68687 71.8313 6 74.5163 6 77.6625V89.4937C6 92.8069 8.68687 95.4937 12 95.4937C15.3131 95.4937 18 92.8069 18 89.4937V77.6625C18 74.6813 15.3131 71.8313 12 71.8313ZM60 36C57.9937 36 56.325 37.0313 55.2375 38.55L66 46.9875V42C66 38.6812 63.3187 36 60 36ZM107.831 0C104.518 0 101.831 2.68687 101.831 6V75.2063L113.831 84.6113V6C113.831 2.68687 111.319 0 107.831 0ZM78 90C78 93.3131 80.6869 96 84 96C87.3131 96 90 93.3131 90 90V88.6684L78 79.2634V90ZM84 18C80.6869 18 78 20.6869 78 24V56.3813L90 65.7862V24C90 20.6812 87.3187 18 84 18Z" fill="black"/></g><defs><clipPath id="clip0_5510_497"><rect width="120" height="96" fill="white"/></clipPath></defs></svg>
      </div>
    </div>
    
    <div id="content-area">
      <h1 id="title">يبدو أن إتصالك بالإنترنيت قد إنقطع</h1>
      <p id="message">تطبيق HAINON يعمل الآن في بيئة مالية مستقلة ومحمية بالكامل. خوارزميات النظام تقوم بجدولة وحفظ كافة العمليات المحاسبية محلياً، وسيتم دمجها ومزامنتها تلقائياً فور إعادة استقرار الشبكة.</p>
      
      <div class="status-panel">
        <div class="radar-indicator"></div>
        <span id="badge">جاري فحص بروتوكول الاتصال تلقائياً</span>
      </div>
    </div>

    <div>
      <button id="retryButton" type="button" onclick="location.reload()"> إعادة الإتصال </button>
    </div>
  </div>

  <script>
    var title = document.getElementById('title');
    var message = document.getElementById('message');
    var badge = document.getElementById('badge');
    var retryButton = document.getElementById('retryButton');
    var container = document.querySelector('.container');

    var userLang = navigator.language.toLowerCase();
    if (userLang.indexOf('ar') === -1) {
      container.style.direction = 'ltr';
      title.innerText = 'Cloud Sync Offline';
      message.innerHTML = 'HAINON is running in an isolated and secure local environment. All accounting operations are safely cached and scheduled, and will fully synchronize once the cloud core service is restored.';
      badge.innerText = 'Automatic network audit in progress';
      retryButton.innerText = 'Initialize Reconnection';
    }

    function updateDarkMode(){
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
      else {
        document.documentElement.setAttribute("data-theme", "light");
      } 
    }
    updateDarkMode();
    if(window.matchMedia){
      window.matchMedia('(prefers-color-scheme: dark)')
        .addEventListener('change', updateDarkMode);
    }
  </script>
</body>
</html>
