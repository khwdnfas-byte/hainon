<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>HAINON</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

.topbar{

display:flex;
justify-content:space-between;
align-items:center;
padding:20px;

}

.logo{

font-size:34px;
font-weight:bold;
color:#d4af37;

}

.menu-btn{

font-size:30px;
cursor:pointer;

}

.sidebar{

position:fixed;
top:0;
right:-300px;
width:300px;
height:100%;
background:#171717;
padding:25px;
transition:.4s;
z-index:1000;

}

.sidebar.active{
right:0;
}

.profile{

text-align:center;
margin-bottom:25px;

}

.profile img{

width:100px;
height:100px;
border-radius:50%;
border:3px solid #d4af37;
object-fit:cover;

}

.profile h2{

margin-top:15px;
color:#d4af37;

}

.profile p{

color:#999;
margin-top:5px;

}

.sidebar hr{

border:none;
height:1px;
background:#333;
margin:20px 0;

}

.sidebar a{

display:block;
padding:15px;
background:#1f1f1f;
margin-bottom:12px;
border-radius:14px;
text-decoration:none;
color:white;
transition:.3s;

}

.sidebar a:hover{

background:#d4af37;
color:black;

}

.container{
padding:20px;
}

.cards{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

.card{

padding:22px;
border-radius:22px;
cursor:pointer;
transition:.3s;

}

.card:hover{
transform:scale(1.03);
}

.red{
background:#7d1717;
}

.green{
background:#11663d;
}

.gold{
background:#8a6a13;
}

.card h3{

font-size:20px;
margin-bottom:12px;

}

.card p{

font-size:26px;
font-weight:bold;

}

.form-box{

margin-top:25px;
background:#181818;
padding:20px;
border-radius:22px;

}

.form-box h2{

margin-bottom:15px;
color:#d4af37;

}

input,select,button{

width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:16px;

}

input,select{

background:#262626;
color:white;

}

button{

background:#d4af37;
font-weight:bold;
cursor:pointer;

}

.transactions{

margin-top:25px;

}

.transactions h2{

margin-bottom:15px;
color:#d4af37;

}

.transaction{

background:#1a1a1a;
padding:18px;
border-radius:18px;
margin-bottom:12px;

}

.transaction h3{

margin-bottom:8px;

}

.transaction small{

color:#aaa;

}

.calculator-button{

position:fixed;
bottom:25px;
left:25px;
width:70px;
height:70px;
background:#d4af37;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:bold;
cursor:pointer;
z-index:1000;
color:black;

}

.calculator{

position:fixed;
bottom:110px;
left:20px;
width:320px;
background:#191919;
padding:20px;
border-radius:22px;
display:none;
z-index:1000;

}

.calculator.active{
display:block;
}

.calculator input{

background:black;
color:white;
font-size:28px;

}

.calc-buttons{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:15px;

}

.calc-buttons button{

padding:16px;
font-size:20px;

}

.previous-days{

margin-top:25px;

}

.day-box{

padding:18px;
background:#1a1a1a;
border-radius:18px;
margin-bottom:12px;

}

</style>

</head>

<body>

<div class="sidebar" id="sidebar">

<div class="profile">

<img
src="https://i.imgur.com/6VBx3io.png"
/>

<h2>
المستخدم
</h2>

<p>
ID: 0001
</p>

</div>

<hr>

<a href="#">
الرئيسية
</a>

<a href="#">
الزبائن
</a>

<a href="#">
التجار
</a>

<a href="#">
التقارير
</a>

<a href="#">
العمليات السابقة
</a>

<a href="#">
الإعدادات
</a>

</div>

<div class="topbar">

<div class="menu-btn"
onclick="toggleSidebar()"
>

☰

</div>

<div class="logo">

HAINON

</div>

</div>

<div class="container">

<div class="cards">

<div
class="card red"
onclick="toggleMoney(this)"
data-usd="0"
data-syp="0"
>

<h3>
الصادر
</h3>

<p>
---
</p>

</div>

<div
class="card green"
onclick="toggleMoney(this)"
data-usd="0"
data-syp="0"
>

<h3>
الوارد
</h3>

<p>
---
</p>

</div>

<div
class="card red"
onclick="toggleMoney(this)"
data-usd="0"
data-syp="0"
>

<h3>
الخسائر
</h3>

<p>
---
</p>

</div>

<div
class="card green"
onclick="toggleMoney(this)"
data-usd="0"
data-syp="0"
>

<h3>
الأرباح
</h3>

<p>
---
</p>

</div>

<div
class="card gold"
onclick="toggleMoney(this)"
data-usd="0"
data-syp="0"
>

<h3>
صافي الدولار
</h3>

<p>
---
</p>

</div>

<div
class="card gold"
onclick="toggleMoney(this)"
data-usd="0"
data-syp="0"
>

<h3>
صافي الليرة
</h3>

<p>
---
</p>

</div>

</div>

<div class="form-box">

<h2>
إضافة عملية
</h2>

<input
type="text"
id="title"
placeholder="اسم العملية"
/>

<input
type="number"
id="amount"
placeholder="المبلغ"
/>

<select id="currency">

<option value="$">
دولار
</option>

<option value="SYP">
ليرة سورية
</option>

</select>

<select id="type">

<option>
صادر
</option>

<option>
وارد
</option>

<option>
أرباح
</option>

<option>
خسائر
</option>

<option>
ديون مدفوعة
</option>

<option>
ديون مستحقة
</option>

<option>
ديون مستوفاة
</option>

<option>
ديون غير مستوفاة
</option>

<option>
مرتجع
</option>

</select>

<button onclick="addTransaction()">

حفظ العملية

</button>

</div>

<div class="transactions">

<h2>
عمليات اليوم
</h2>

<div id="transactions">

</div>

</div>

<div class="previous-days">

<h2>
العمليات السابقة
</h2>

<div id="daysList">

</div>

</div>

</div>

<div
class="calculator-button"
onclick="toggleCalc()"
>

🧮

</div>

<div
class="calculator"
id="calculator"
>

<input
type="text"
id="calcInput"
/>

<div class="calc-buttons">

<button onclick="addCalc('7')">7</button>
<button onclick="addCalc('8')">8</button>
<button onclick="addCalc('9')">9</button>
<button onclick="addCalc('/')">÷</button>

<button onclick="addCalc('4')">4</button>
<button onclick="addCalc('5')">5</button>
<button onclick="addCalc('6')">6</button>
<button onclick="addCalc('*')">×</button>

<button onclick="addCalc('1')">1</button>
<button onclick="addCalc('2')">2</button>
<button onclick="addCalc('3')">3</button>
<button onclick="addCalc('-')">-</button>

<button onclick="addCalc('0')">0</button>
<button onclick="addCalc('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="addCalc('+')">+</button>

<button onclick="clearCalc()">
C
</button>

</div>

</div>

<script>

let transactions = JSON.parse(
localStorage.getItem("transactions")
) || []

function saveData(){

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
)

}

function toggleSidebar(){

document
.getElementById("sidebar")
.classList.toggle("active")

}

function addTransaction(){

let title =
document.getElementById("title").value

let amount =
document.getElementById("amount").value

let currency =
document.getElementById("currency").value

let type =
document.getElementById("type").value

if(title===""||amount===""){
return
}

transactions.unshift({

title,
amount,
currency,
type,
date:new Date().toLocaleString()

})

saveData()

renderTransactions()

document.getElementById("title").value=""
document.getElementById("amount").value=""

}

function renderTransactions(){

let box =
document.getElementById("transactions")

box.innerHTML=""

transactions.forEach(item=>{

box.innerHTML += `

<div class="transaction">

<h3>
${item.title}
</h3>

<p>
${item.amount}
${item.currency}
</p>

<small>
${item.type}
-
${item.date}
</small>

</div>

`

})

}

renderTransactions()

function toggleMoney(card){

let state =
card.getAttribute("data-state")

let usd =
card.getAttribute("data-usd")

let syp =
card.getAttribute("data-syp")

let text =
card.querySelector("p")

if(!state){

text.innerHTML =
usd + " $"

card.setAttribute("data-state","usd")

}

else if(state==="usd"){

text.innerHTML =
syp + " SYP"

card.setAttribute("data-state","syp")

}

else{

text.innerHTML="---"

card.removeAttribute("data-state")

}

}

function toggleCalc(){

document
.getElementById("calculator")
.classList.toggle("active")

}

function addCalc(val){

document
.getElementById("calcInput")
.value += val

}

function clearCalc(){

document
.getElementById("calcInput")
.value = ""

}

function calculate(){

let input =
document
.getElementById("calcInput")

try{

input.value =
eval(input.value)

}

catch{

input.value = "ERROR"

}

}

</script>

</body>

  </html>
