<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAINON - النظام المالي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h1>HAINON</h1>
            <input type="email" id="auth-email" placeholder="البريد الإلكتروني">
            <input type="password" id="auth-password" placeholder="كلمة المرور (6 خانات + حرف)">
            <button id="login-btn">دخول</button>
        </div>
    </div>

    <!-- شاشة إعداد الصورة (تظهر مرة واحدة) -->
    <div id="profile-setup-screen" class="screen hidden">
        <div class="auth-box">
            <h2>اختر صورتك الشخصية</h2>
            <div class="upload-preview" id="preview">👤</div>
            <input type="file" id="profile-pic-input" accept="image/*">
            <button id="save-pic-btn">حفظ ومتابعة</button>
            <button id="skip-pic-btn" class="secondary-btn">تخطي</button>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="app-screen" class="screen hidden">
        <!-- الصورة في الأعلى (دائماً) -->
        <div class="top-bar">
            <button id="menu-btn">☰</button>
            <div class="user-avatar-top" id="top-avatar">👤</div>
        </div>

        <!-- القائمة الجانبية -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-user-section">
                <div class="user-avatar-sidebar" id="sidebar-avatar">👤</div>
                <h3 id="sidebar-name">المستخدم</h3>
                <p id="sidebar-id">ID: 00000</p>
                <div class="gold-divider"></div>
            </div>
            <nav class="nav-menu">
                <button data-view="dashboard">الرئيسية</button>
                <button data-view="add-trans">إضافة عملية</button>
                <button id="logout-btn">تسجيل خروج</button>
            </nav>
        </aside>

        <main class="main-content">
            <!-- المحتوى سيتم تحميله هنا -->
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
  </html>
