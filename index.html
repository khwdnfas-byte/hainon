<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAINON | الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="container">
        <div class="auth-box">
            <h1>HAINON</h1>
            <p>يرجى إدخال مفتاح الدخول للمتابعة</p>
            <input type="password" id="access-key" placeholder="كلمة السر">
            <button id="enter-btn">فتح النظام</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <header>
            <h1>لوحة التحكم</h1>
            <button id="logout-btn">خروج</button>
        </header>
        <main>
            </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
