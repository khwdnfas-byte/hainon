<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta

<title>HAINON</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
font-size:32px;
font-weight:bold;
color:#d4af37;
}

.cards{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

.card{

padding:20px;
border-radius:20px;
cursor:pointer;
transition:.3s;

}

.card:hover{
transform:scale(1.03);
}

.red{
background:#7a1111;
}

.green{
background:#0d6a37;
}

.card h2{
font-size:22px;
margin-bottom:10px;
}

.card p{
font-size:24px;
font-weight:bold;
}

.form-box{

margin-top:25px;
background:#1a1a1a;
padding:20px;
border-radius:20px;

}

input,select,button{

width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;

}

button{

background:#d4af37;
font-weight:bold;
cursor:pointer;

}

.transactions{

margin-top:25px;

}

.transaction{

background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-bottom:10px;

}

.calculator{

position:fixed;
bottom:20px;
left:20px;
width:70px;
height:70px;
border-radius:50%;
background:#d4af37;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
cursor:pointer;
color:black;
font-weight:bold;

}

.hidden{
display:none;
}

.calc-box{

position:fixed;
bottom:100px;
left:20px;
background:#1b1b1b;
padding:20px;
border-radius:20px;
width:300px;

}

.calc-box input{

background:black;
color:white;
font-size:25px;

}

.calc-buttons{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;

}

.calc-buttons button{
padding:15px;
font-size:20px;
}

</style>

</head>
