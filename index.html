<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HAINON</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.login{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
background:#0f0f0f;
}

input,button{
padding:12px;
width:260px;
border:none;
border-radius:10px;
}

input{background:#222;color:white;}
button{background:#d4af37;font-weight:bold;cursor:pointer;}

.hidden{display:none;}

.container{padding:20px;}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h2>تسجيل الدخول</h2>

<input id="email" placeholder="الإيميل">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>
<button onclick="register()">إنشاء حساب</button>
</div>

<!-- APP -->
<div class="container hidden" id="app">

<h2>HAINON</h2>
<button onclick="logout()">خروج</button>

<div class="cards">

<div class="card">
<h3>الوارد</h3>
<p id="income">0</p>
</div>

<div class="card">
<h3>الصادر</h3>
<p id="outcome">0</p>
</div>

<div class="card">
<h3>الصافي</h3>
<p id="net">0</p>
</div>

</div>

<p id="userId"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid = null;
let isAdmin = false;
let numericId = null;

/* AUTH */
window.register = async ()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async ()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = async ()=>{
await signOut(auth);
};

/* MAIN */
onAuthStateChanged(auth, async (user)=>{

if(!user){
loginBox.classList.remove("hidden");
app.classList.add("hidden");
return;
}

uid = user.uid;

/* ADMIN SYSTEM (first user only) */
let adminRef = doc(db,"system","admin");
let adminSnap = await getDoc(adminRef);

if(!adminSnap.exists()){
await setDoc(adminRef,{
adminUid: uid,
createdAt: Date.now()
});
}

let adminData = (await getDoc(adminRef)).data();
isAdmin = adminData.adminUid === uid;

/* USER NUMBER SYSTEM */
let counterRef = doc(db,"system","counter");
let counterSnap = await getDoc(counterRef);

if(!counterSnap.exists()){
await setDoc(counterRef,{value:0});
}

let userRef = doc(db,"users",uid);
let userSnap = await getDoc(userRef);

if(!userSnap.exists()){

let counterData = (await getDoc(counterRef)).data();

numericId = counterData.value;

await setDoc(userRef,{
income:0,
outcome:0,
numericId:numericId
});

await updateDoc(counterRef,{
value: increment(1)
});

}else{
numericId = userSnap.data().numericId;
}

/* LOAD DATA */
let data = (await getDoc(userRef)).data();

income.innerText = data.income;
outcome.innerText = data.outcome;
net.innerText = data.income - data.outcome;

/* UI */
loginBox.classList.add("hidden");
app.classList.remove("hidden");

userId.innerText =
"User ID: " + numericId + (isAdmin ? " (ADMIN)" : "");

});

</script>

</body>
</html>
