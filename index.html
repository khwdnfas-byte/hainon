<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAINON | نظام الإدارة المالي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="container">
        <div class="auth-box">
            <h1>HAINON</h1>
            <input type="password" id="access-key" placeholder="كلمة السر">
            <button id="enter-btn">فتح النظام</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <aside id="sidebar">
            <div class="user-profile">
                <div class="avatar-frame"><img src="avatar.png" alt="Profile"></div>
                <h2 id="user-name">الأدمن</h2>
                <p id="user-id">ID: 11110</p>
            </div>
            <hr class="gold-divider">
            <nav>
                <ul>
                    <li>الرئيسية</li>
                    <li>العمليات المالية</li>
                    <li>الديون</li>
                </ul>
                <button id="logout-btn">خروج</button>
            </nav>
        </aside>

        <main id="main-content">
            <h1>مرحباً بك في لوحة تحكم HAINON</h1>
            <div class="accordion">
    <button class="accordion-header">إضافة عملية مالية جديدة</button>
    <div class="accordion-content">
        <select id="op-type">
            <option value="وارد">وارد</option>
            <option value="صادر">صادر</option>
            <option value="بيع">بيع</option>
            <option value="شراء">شراء</option>
            <option value="مرتجع">مرتجع</option>
        </select>
        <input type="number" id="op-amount" placeholder="المبلغ">
        <input type="text" id="op-desc" placeholder="ملاحظات (اختياري)">
        <button id="add-op-btn">حفظ العملية</button>
    </div>
            </div>
            <table id="transactions-table">
    <thead>
        <tr>
            <th>النوع</th>
            <th>المبلغ</th>
            <th>الوصف</th>
        </tr>
    </thead>
    <tbody id="transactions-body">
        </tbody>
            </table>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
